<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Caderno de Descobertas</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Estilos Globais e do Login -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">

  <div class="login-container">
    <div class="login-card">

      <!-- LOGO / HEADER -->
      <div class="login-header">
        <h1 class="login-title" id="login-title">Bem-vindo(a) de volta!</h1>
        <p class="login-subtitle" id="login-subtitle">Entre para continuar sua jornada na ilha.</p>
      </div>

      <div class="auth-wrapper">
        <!-- SESSÃO DE LOGIN -->
        <div id="login-section" class="auth-section is-active">
          <form id="login-form" class="auth-form">
            <div class="form-group">
              <label for="login-email">E-mail</label>
              <input type="email" id="login-email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
              <label for="login-password">Senha</label>
              <input type="password" id="login-password" placeholder="Sua senha secreta">
            </div>

            <button type="submit" class="btn-submit">Fazer Login</button>
          </form>

          <div class="auth-toggle">
            <span>Não possui uma conta?</span>
            <button type="button" id="btn-go-signup" class="btn-text">Criar conta</button>
          </div>
        </div>

        <!-- SESSÃO DE CADASTRO -->
        <div id="signup-section" class="auth-section">
          <form id="signup-form" class="auth-form">

            <div class="form-group">
              <label for="signup-family">Nome da Família</label>
              <input type="text" id="signup-family" placeholder="Ex: Família Silva">
            </div>

            <div class="form-group">
              <label for="signup-email">E-mail</label>
              <input type="email" id="signup-email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
              <label for="signup-password">Senha</label>
              <input type="password" id="signup-password" placeholder="Crie uma senha forte">
            </div>

            <button type="submit" class="btn-submit">Criar minha conta</button>
          </form>

          <div class="auth-toggle">
            <span>Já tem uma conta?</span>
            <button type="button" id="btn-go-login" class="btn-text">Fazer Login</button>
          </div>
        </div>
        <!-- FIM SESSÃO DE CADASTRO -->
      </div> <!-- FIM AUTH WRAPPER -->

    </div>
  </div>

  <script src="js/login.js"></script>
</body>

</html>
