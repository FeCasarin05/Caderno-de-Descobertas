  <div id="ui-overlay">

    <!-- ── HEADER ────────────────────────────── -->
    <header id="header">
      <div id="logo-area">
        <span class="logo-icon" aria-hidden="true">✨</span>
        <div class="logo-text">
          <span class="logo-title">Caderno de</span>
          <span class="logo-highlight">Descobertas</span>
        </div>
      </div>

      <div id="header-controls">
        <button id="btn-sound" class="control-btn" aria-label="Ativar/desativar som" title="Som">
          <img src="SVG/ícone som.svg" alt="Som" aria-hidden="true" class="control-icon" />
        </button>
        <button id="btn-settings" class="control-btn" aria-label="Configurações" title="Configurações">
          <img src="SVG/ícone config.svg" alt="Configurações" aria-hidden="true" class="control-icon" />
        </button>
      </div>
    </header>

    <!-- ── NINA – PERSONAGEM GUIA ─────────────── -->
    <aside id="nina-area" aria-label="Personagem guia Nina">
      <div class="nina-character" id="nina-character">
        <img src="SVG/NINA CAPIVARA.svg" alt="Nina, a capivara guia" class="nina-img"
          onerror="this.style.display='none'; this.parentElement.classList.add('nina-placeholder')" />
      </div>
      <!-- Balão sai da Nina, posicionado à direita dela -->
      <div class="speech-bubble" id="nina-bubble">
        <p id="nina-text">Oi! Vamos explorar a ilha e descobrir novas atividades em família? 🌟</p>
      </div>
    </aside>

    <!-- ── CAMPO DE PALAVRA-CHAVE ─────────────── -->
    <section id="keyword-area" aria-label="Inserir palavra-chave">
      <form id="keyword-form" autocomplete="off">
        <svg class="keyword-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="keyword-input" class="keyword-input" placeholder="Digite uma palavra-chave"
          maxlength="40" aria-label="Digite uma palavra-chave descoberta nas atividades" autocomplete="off"
          spellcheck="false" />
        <button type="submit" id="btn-unlock" class="btn-unlock" aria-label="Desbloquear distintivo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            aria-hidden="true">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </form>
      <div id="keyword-feedback" class="keyword-feedback" aria-live="polite"></div>
    </section>

    <!-- ── BOTÕES PRINCIPAIS ──────────────────── -->
    <nav id="main-buttons" aria-label="Navegação principal">
      <button id="btn-atividades" class="main-btn btn-primary" aria-label="Ver atividades">
        <img src="SVG/ícone livro.svg" alt="" aria-hidden="true" class="btn-svg-icon" />
        <span class="btn-label">Ver atividades</span>
      </button>
      <button id="btn-distintivos" class="main-btn btn-secondary" aria-label="Ver distintivos">
        <img src="SVG/ícone distintivos.svg" alt="" aria-hidden="true" class="btn-svg-icon" />
        <span class="btn-label">Ver distintivos</span>
      </button>
    </nav>

    <!-- ── DICAS E AJUDA (mobile badge) ──────── -->
    <button id="btn-dicas" class="dicas-btn" aria-label="Dicas e Ajuda">
      <span aria-hidden="true">💡</span>
      <span>Dicas e Ajuda</span>
    </button>

  </div><!-- /ui-overlay -->


  <!-- ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ 
       MODAL LIVRO – VER ATIVIDADES
  ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═  -->
  <div id="book-modal-overlay" hidden aria-hidden="true">

    <div class="book-backdrop" id="book-backdrop"></div>

    <div class="book-modal" role="dialog" aria-modal="true" aria-label="Livro de Aventuras" id="book-modal">

      <!-- Botão fechar (sempre visível) -->
      <button class="book-close-btn" id="book-close-btn" aria-label="Fechar livro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>

      <!-- Perspectiva 3D -->
      <div class="book-body" id="book-body">
        <div class="book-shell" id="book-shell">

          <!-- Cantos dourados -->
          <div class="book-corner tl" aria-hidden="true"></div>
          <div class="book-corner tr" aria-hidden="true"></div>
          <div class="book-corner bl" aria-hidden="true"></div>
          <div class="book-corner br" aria-hidden="true"></div>

          <!-- ═ ═  ESTADO 1: CAPA FECHADA ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ 
               Visível quando o livro ainda não foi aberto.
               Cor: tom avermelhado/bordô (wine/burgundy).
               A capa "vira" para a esquerda ao clicar em "Abrir".
          ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═  -->
          <div class="book-cover-panel" id="book-cover-panel" aria-label="Capa do livro">
            <!-- Textura / borda interna decorativa -->
            <div class="cover-inner-border">
              <div class="cover-top-ornament" aria-hidden="true">✦ ✦ ✦</div>
              <div class="cover-book-icon" aria-hidden="true">
                <img src="SVG/LIRA ARARA.svg" alt="Lira Arara"
                  style="height: 4.5rem; width: auto; object-fit: contain;">
              </div>
              <h2 class="cover-main-title">Livro de<br>Aventuras</h2>
              <p class="cover-sub-title">✦ Caderno de Descobertas ✦</p>
              <div class="cover-divider" aria-hidden="true"></div>
              <button class="btn-open-cover" id="btn-open-cover">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                Abrir o Livro
              </button>
              <div class="cover-bottom-ornament" aria-hidden="true">✦ ✦ ✦</div>
            </div>
            <!-- Lombada visível na capa fechada -->
            <div class="cover-spine" aria-hidden="true"></div>
          </div>

          <!-- ═ ═  ESTADO 2: PÁGINAS ABERTAS ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═

          ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═  -->
          <div class="book-pages-wrapper" id="book-pages-wrapper">

            <!-- Página esquerda -->
            <div class="book-page page-left" id="book-page-left">
              <!-- conteúdo injetado por JS -->
            </div>

            <!-- Lombada central -->
            <div class="book-center-spine" aria-hidden="true">
              <div class="spine-shadow-left"></div>
              <div class="spine-line"></div>
              <div class="spine-shadow-right"></div>
            </div>

            <!-- Página direita -->
            <div class="book-page page-right" id="book-page-right">
              <!-- conteúdo injetado por JS -->
            </div>

            <div class="book-flipper" id="book-flipper">
              <div class="flipper-face flipper-front" id="flipper-front"></div>
              <div class="flipper-face flipper-back" id="flipper-back"></div>
            </div>

            <!-- ── Setas dentro do livro ─────────────── -->
            <button class="book-arrow arrow-prev" id="book-prev" aria-label="Página anterior">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"

                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>

            <button class="book-arrow arrow-next" id="book-next" aria-label="Próxima página">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                aria-hidden="true">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <!-- ── Dots de página (barra inferior dentro do livro) -->
            <div class="book-dots-bar" aria-hidden="true">
              <div class="book-dots" id="book-dots"></div>
            </div>

          </div><!-- /book-pages-wrapper -->

        </div><!-- /book-shell -->
      </div><!-- /book-body -->

    </div><!-- /book-modal -->
  </div><!-- /book-modal-overlay -->


  <!-- ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═

  ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═ ═  -->

    <div class="board-backdrop" id="backdrop-distintivos"></div>

        </svg>
      </button>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>

      <button class="board-nav-btn nav-next" id="badges-next-btn" aria-label="Próxima página" style="display:none;"

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round">
